<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Klasyfikacja irysów</title>
</head>
<body>
    <h1>Klasyfikacja irysów</h1>
    <form method="POST">
        Sepal length: <input type="number" name="sepal_length" step="0.1" required><br>
        Sepal width: <input type="number" name="sepal_width" step="0.1" required><br>
        Petal length: <input type="number" name="petal_length" step="0.1" required><br>
        Petal width: <input type="number" name="petal_width" step="0.1" required><br>
        <button type="submit">Klasyfikuj</button>
    </form>
</body>
</html>
